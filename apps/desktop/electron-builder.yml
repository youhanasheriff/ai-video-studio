appId: com.aivideostudio.desktop
productName: AI Video Studio
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/python
    to: python
    filter:
      - "**/*.py"
mac:
  target:
    - dmg
    - zip
  artifactName: "${productName}-${version}-${arch}.${ext}"
  category: public.app-category.video
  icon: build/icon.png
  hardenedRuntime: false
win:
  target:
    - nsis
  artifactName: "${productName}-${version}-${arch}.${ext}"
  icon: build/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  target:
    - AppImage
    - deb
  artifactName: "${productName}-${version}-${arch}.${ext}"
  category: AudioVideo
  icon: build/icon.png
publish:
  provider: generic
  url: https://example.com/ai-video-studio/releases
